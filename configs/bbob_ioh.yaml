run:
  name: bbob_ioh
  output_dir: runs/bbob
  seed: 23

problem:
  type: bbob
  function_ids: [ 1, 3 ]
  dimension: 2
  search_instances: [ 1 ]
  test_instances: [ 2 ]
  test_dimensions: [ 3 ]
  bounds: [ -5.0, 5.0 ]
  aocc_lower_bound: 0.00000001
  aocc_upper_bound: 100.0
  comparison_baselines: [ random_search, differential_evolution ]

llm:
  provider: openai
  model: gpt-5.4-mini
  temperature: 0.6
  api_key_env: OPENAI_API_KEY

evolution:
  population_size: 2
  generations: 2
  offspring_per_strategy: 1

evaluation:
  budget: 10000
  timeout_seconds: 60
  timeout_penalty: 0
  seeds: [ 11 ]
  metric: mean_aocc
