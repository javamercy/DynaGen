run:
  name: tsp_deepseek_example
  output_dir: runs/tsp_deepseek
  seed: 42

llm:
  provider: deepseek
  model: deepseek-coder
  temperature: 0.7
  api_key_env: DEEPSEEK_API_KEY

evolution:
  population_size: 2
  generations: 4
  offspring_per_strategy: 1
  archive:
    enabled: true
    max_size: 64
    max_per_bucket: 4
    add_statuses: [ valid, evaluated, timeout ]
    parent_sample_probability: 0.35
    s3_archive_parent_min: 1
    final_selection_uses_archive: true
    deduplicate_code: true
    diversity_weight: 0.25
    recency_weight: 0.05
    robustness_weight: 0.35

evaluation:
  budget: 2000
  timeout_seconds: 600
  timeout_penalty: 0
  seeds: [ 42 ]
  metric: average_gap

data:
  search_instances: synthetic:llamea:seeds=11,23,69:sizes=32,50,100,200
  test_instances: data/tsp/test_instances
