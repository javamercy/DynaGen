run:
  name: tsp_calls_20
  output_dir: runs/tsp
  seed: 69

llm:
  provider: openai
  model: gpt-5.4-mini
  temperature: 0.7
  api_key_env: OPENAI_API_KEY

evolution:
  population_size: 3
  generations: 6
  offspring_per_strategy: 1
  verbal_gradients:
    enabled: true
    static_enabled: true
    llm_enabled: true
    llm_every_n_generations: 2
    max_llm_calls_per_generation: 2
    llm_model: gpt-5.4-nano
    temperature: 0.2

evaluation:
  budget: 2000
  timeout_seconds: 600
  timeout_penalty: 0
  seeds: [ 69 ]
  metric: average_gap

data:
  search_instances: synthetic:llamea:69:50 # seed:size
  test_instances: data/tsp/test_instances
