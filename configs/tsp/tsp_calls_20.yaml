run:
  name: tsp_calls_20
  output_dir: runs/tsp
  seed: 69

llm:
  provider: openai
  model: gpt-5.4-nano
  temperature: 0.7
  api_key_env: OPENAI_API_KEY

evolution:
  population_size: 2
  generations: 4
  offspring_per_strategy: 1

evaluation:
  budget: 2000
  timeout_seconds: 600
  timeout_penalty: 0
  seeds: [ 69 ]
  metric: average_gap

data:
  search_instances: synthetic:llamea:69:50 # seed:size
  test_instances: data/tsp/test_instances
