run:
  name: tsp_calls_20
  output_dir: runs/tsp_deepseek
  seed: 34

llm:
  provider: deepseek
  model: deepseek-v4-flash
  temperature: 0.7
  api_key_env: DEEPSEEK_API_KEY

evolution:
  population_size: 3
  generations: 10
  offspring_per_strategy: 1
  archive:
    enabled: true
    max_size: 64
    max_per_bucket: 4
    add_statuses: [ valid, evaluated, timeout ]
    parent_sample_probability: 0.35
    s3_archive_parent_min: 1
    final_selection_uses_archive: true
    deduplicate_code: true
    diversity_weight: 0.25
    recency_weight: 0.05
    robustness_weight: 0.35
  verbal_gradients:
    enabled: true
    static_enabled: true
    llm_enabled: true
    llm_every_n_generations: 2
    max_llm_calls_per_generation: 2
    llm_model: deepseek-v4-flash
    temperature: 0.3

evaluation:
  budget: 3000
  timeout_seconds: 250
  timeout_penalty: 0
  seeds: [ 15, 20 ]
  metric: average_gap

data:
  search_instances: synthetic:llamea:seeds=11,23:sizes=50,100,200
  test_instances: data/tsp/test_instances
