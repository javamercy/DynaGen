run:
  name: tsp_openai
  output_dir: runs
  seed: 99

llm:
  provider: openai
  model: gpt-5.4-mini
  temperature: 0.5
  api_key_env: OPENAI_API_KEY

evolution:
  population_size: 3
  generations: 3
  offspring_per_strategy: 1

evaluation:
  budget: 1000
  timeout_seconds: 60
  seeds: [ 31, 69 ]
  metric: average_gap

data:
  search_instances: data/tsp/search_instances
