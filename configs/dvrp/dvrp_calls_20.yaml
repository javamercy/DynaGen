run:
  name: dvrp_calls_20
  output_dir: runs/dvrp
  seed: 69

problem:
  type: dvrp
  dvrp_search_limit: 10
  dvrp_test_sizes: [ 10, 20, 50, 100, 200 ]
  dvrp_test_limit_per_size: 64

llm:
  provider: openai
  model: gpt-5.4-mini
  temperature: 0.7
  api_key_env: OPENAI_API_KEY

evolution:
  population_size: 3
  generations: 6
  offspring_per_strategy: 1
  strategies: [ S1, S2, S3 ]

evaluation:
  budget: 2000
  timeout_seconds: 300
  timeout_penalty: 0
  seeds: [ 100 ]
  metric: mean_gap

data:
  search_instances: data/dvrp/train/instances.pkl
  test_instances: data/dvrp/test
