run:
  name: dvrp_calls_20
  output_dir: runs/dvrp
  seed: 69

problem:
  type: dvrp
  dvrp_search_limit: 10
  dvrp_test_sizes: [ 10, 20, 50, 100, 200 ]
  dvrp_test_limit_per_size: 64

llm:
  provider: deepseek
  model: deepseek-v4-flash
  temperature: 0.7
  api_key_env: DEEPSEEK_API_KEY

evolution:
  population_size: 3
  generations: 6
  offspring_per_strategy: 1
  strategies: [ S1, S2, S3 ]
  archive:
    enabled: true
    max_size: 64
    max_per_bucket: 4
    add_statuses: [ valid, evaluated, timeout ]
    parent_sample_probability: 0.35
    s3_archive_parent_min: 1
    final_selection_uses_archive: true
    deduplicate_code: true
    diversity_weight: 0.25
    recency_weight: 0.05
    robustness_weight: 0.35

evaluation:
  budget: 2000
  timeout_seconds: 300
  timeout_penalty: 0
  seeds: [ 100 ]
  metric: mean_gap

data:
  search_instances: data/dvrp/train/instances.pkl
  test_instances: data/dvrp/test
